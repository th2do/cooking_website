<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Archive</title>
    <link rel="stylesheet" href="recipes.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h2 class="logo">Công thức nấu ăn</h2>
            <p class="subtitle">My Culinary Archive</p>
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="recipe-search" placeholder="Tìm kiếm..." autocomplete="off">
                <button id="clear-search" class="hidden" aria-label="Clear search">&times;</button>
            </div>
        </div>

        <ul id="recipe-list"></ul>
    </nav>

    <main class="content" id="recipe-display">
        <div id="main-page-welcome" class="welcome-screen">
            <div class="welcome-image-container">
                <img src="mainPageImg.jpg" alt="A welcoming kitchen scene" class="main-page-img">
            </div>
            <div class="welcome-text">
                <h1>Chào Đít Bự</h1>
                <p>Hãy chọn hoặc tìm kiếm công thức ở bên trái nhé!</p>
            </div>
        </div>

        <div id="recipe-details-container" class="recipe-details-container hidden"></div>
    </main>

    <script src="recipeDB.js"></script>
    <script src="recipes.js"></script>
</body>

</html>
